name: Build (Linux x86/64)

on:
  push:
    - "**.cpp"
    - "**.h"
    - "**.meson.build"
    - ".github/workflows/*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build
        run: nix build

      - name: Flake integrity
        run: nix flake check
